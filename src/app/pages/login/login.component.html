<div class="container mt-5">
    <h2 class="text-center text-warning p-4">Iniciar Sesión</h2>

    <div *ngIf="error" class="alert alert-danger">
        {{ error }}
    </div>

    <form (ngSubmit)="login()">
        <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" maxlength="40" class="form-control" [(ngModel)]="usuario" name="usuario">
        </div>

        <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" maxlength="64" class="form-control" [(ngModel)]="password" name="password">
        </div>

        <button type="submit" class="btn btn-warning w-100">Ingresar</button>
    </form>
</div>
